[pytest]
# Path-anchored exclusion for the top-level runs/ directory only.
#
# runs/<timestamp>/project/tests/ holds historical, isolated build-artifact
# copies from past loop-team runs. Multiple sibling runs/*/project/tests/
# directories each define a same-named `tests` package, and pytest's default
# rootdir-relative import registers only the first one under
# sys.modules['tests'] — every subsequent same-named module in a different
# runs/*/project/tests/ directory then fails collection with
# ModuleNotFoundError.
#
# --ignore-glob=runs/* is PATH-ANCHORED relative to the rootdir (this file's
# directory), so it only matches the top-level runs/ path. It must NOT be
# replaced with a bare `norecursedirs = runs`: norecursedirs does fnmatch_ex
# against the basename at EVERY depth in the tree, so it would also match
# the unrelated loop-team/runs/ directory and silently drop the 39 real,
# currently-passing tests under loop-team/runs/*/project/tests/ (734
# collected instead of the correct 773). See
# loop-team/runs/2026-07-02_pytest-root-collection-fault/specs/spec.md.
addopts = --ignore-glob=runs/* -ra

# `slow` marks tests that shell out to a real external repo/process (e.g.
# harness/test_verify_node.py's VAC1RealPadsplitRepo, which invokes
# `npx vitest run` against ~/Claude/Projects/padsplit-cockpit/web and can
# run for a long time with no visible progress). evals/verify_build.py's
# pytest_sweep() passes `-m "not slow"` to exclude these from the default
# sweep; run them explicitly on demand with `-m slow`.
markers =
    slow: real external-repo/process tests excluded from the default sweep
    product_mandatory: sealed Codex product-pilot acceptance tests required by the exact gate

# macOS system Python links against LibreSSL, which makes urllib3 v2 emit a
# process-level compatibility warning during tests that import requests/urllib3.
# This is an environment warning, not a harness failure; keep real test warnings
# visible while suppressing this one known platform notice.
filterwarnings =
    ignore:urllib3 v2 only supports OpenSSL 1\.1\.1\+.*
